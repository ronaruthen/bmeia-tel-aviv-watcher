name: Check BMEIA Tel Aviv appointment

on:
  schedule:
    # Best-effort every 15 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    # Manual "Run workflow" button. Set announce=true to get a status ping
    # even when nothing changed (useful for the first run).
    inputs:
      announce:
        description: "Send a Telegram status message even if nothing changed"
        type: boolean
        default: false

# Allow the job to push the updated state.json back to the repo.
permissions:
  contents: write

# Don't let overlapping runs race on the state commit.
concurrency:
  group: bmeia-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run availability check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BMEIA_ANNOUNCE: ${{ inputs.announce && '1' || '' }}
          # Optional overrides (defaults baked into the script):
          # BMEIA_CALENDAR_ID: "25889593"   # 1. Passports/IDs/Citizenship for newborns
          # BMEIA_PERSON_COUNT: "1"
          # BMEIA_EARLIEST_ACCEPTABLE: "2026-06-28"
          # BMEIA_ALERT_IF_BEFORE: ""        # e.g. "2026-08-01" to only alert before Aug
        run: python check_bmeia.py

      - name: Persist state
        if: always()
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "bmeia-watcher"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "Update appointment state [skip ci]"
            git push
          else
            echo "state.json unchanged — nothing to commit"
          fi
